<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#3A6B4A;--green-light:#6FA88A;--green-dark:#2E5A3E;
  --border:#DDD5C8;--text:#2A2420;--muted:#7A6E68;--hint:#AAA09A;
  --bg:#fff;--bg2:#F7F3EC;--bg3:#F0EBE3;--amber:#D4A017;
  --c-fru-bg:#D9EAD3;--c-fru-tx:#274E13;--c-fru-bd:#93C47D;
  --c-verd-bg:#274E13;--c-verd-tx:#fff;--c-verd-bd:#38761D;
  --c-leg-bg:#F6B26B;--c-leg-tx:#783F04;--c-leg-bd:#E69138;
  --c-cer-bg:#FFE599;--c-cer-tx:#7F6000;--c-cer-bd:#FFD966;
  --c-hue-bg:#7F6000;--c-hue-tx:#fff;--c-hue-bd:#7F6000;
  --c-lac-bg:#fff;--c-lac-tx:#444;--c-lac-bd:#DDD5C8;
  --c-psb-bg:#4A86E8;--c-psb-tx:#fff;--c-psb-bd:#1155CC;
  --c-psa-bg:#9FC5E8;--c-psa-tx:#1A3A5C;--c-psa-bd:#6FA8DC;
  --c-cab-bg:#EA9999;--c-cab-tx:#4C1130;--c-cab-bd:#CC4125;
  --c-car-bg:#E06666;--c-car-tx:#fff;--c-car-bd:#CC0000;
  --c-mer-bg:#F3EDF8;--c-mer-tx:#4A2A6B;--c-mer-bd:#7B5EA7;
  --c-piz-bg:#FDF0E8;--c-piz-tx:#7A3A10;--c-piz-bd:#C45A20;
  --c-fal-bg:#FCEBEB;--c-fal-tx:#A32D2D;--c-fal-bd:#A32D2D;
  --c-empty-bg:#F7F3EC;--c-empty-tx:#AAA09A;--c-empty-bd:#DDD5C8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg3);color:var(--text);overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden}
.topbar{background:var(--green);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-t{color:#fff;font-size:18px;font-weight:500;letter-spacing:-.02em}
.topbar-t em{font-style:italic;color:#A8D4B4}
.save-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;font-size:11px;padding:4px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;display:flex;align-items:center;gap:5px}
.save-btn:hover{background:rgba(255,255,255,.25)}
.save-status{font-size:10px;color:rgba(255,255,255,.7);white-space:nowrap}
.sync-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2A2420;color:#fff;font-size:12px;padding:8px 16px;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-toast.show{opacity:1}
.tabs{display:flex;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;z-index:10}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif}
.tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.tab.on{color:var(--green);border-bottom-color:var(--green);font-weight:500}
.ctrl{display:none;align-items:center;gap:6px;padding:8px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.chip{border:0.5px solid var(--border);background:var(--bg);border-radius:20px;font-size:11px;padding:4px 10px;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:'DM Sans',sans-serif}
.chip.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.chip-div{width:1px;height:14px;background:var(--border)}
.btn-gen{background:var(--green);border:none;color:#fff;border-radius:20px;font-size:11px;padding:4px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;margin-left:auto;white-space:nowrap}
.week-nav{display:flex;align-items:center;gap:5px}
.wbtn{background:var(--bg2);border:0.5px solid var(--border);color:var(--text);width:24px;height:24px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wbtn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.wtxt{color:var(--text);font-size:11px;font-weight:500;white-space:nowrap}
.cal-nav-btn{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;min-width:40px;justify-content:center}
.cal-nav-btn:hover{border-color:var(--green)}
.balance-panel{padding:10px 16px 8px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.balance-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.balance-toggle{font-size:10px;color:var(--green);cursor:pointer;font-weight:500}
.balance-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.bal-item{display:flex;flex-direction:column;gap:3px}
.bal-label{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bal-bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bal-bar{height:100%;border-radius:4px;transition:width .3s}
.bal-bar.ok{background:#3A6B4A}
.bal-bar.low{background:#E69138}
.bal-bar.danger{background:#CC0000}
.bal-count{font-size:9px;color:var(--muted);text-align:right}
/* INLINE PANELS (balance + ideas inside main scroll) */
.balance-panel{padding:10px 16px 8px;background:var(--bg);border-top:0.5px solid var(--border)}
.ideas-panel-inline{padding:10px 16px 16px;background:var(--bg);border-top:0.5px solid var(--border)}
.ideas-panel-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ideas-panel-grid{display:flex;flex-wrap:wrap;gap:10px}
.ideas-cat-group{display:flex;flex-direction:column;gap:4px;min-width:100px}
.ideas-cat-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.idea-chip{border-radius:4px;padding:4px 8px;font-size:11px;cursor:grab;white-space:nowrap;border-left:3px solid transparent;display:inline-block;user-select:none;-webkit-user-select:none}
.idea-chip:active{cursor:grabbing}
.idea-chip.used{opacity:.4}
.idea-chip.fru{background:var(--c-fru-bg);color:var(--c-fru-tx);border-left-color:var(--c-fru-bd)}
.idea-chip.verd{background:var(--c-verd-bg);color:var(--c-verd-tx);border-left-color:var(--c-verd-bd)}
.idea-chip.leg{background:var(--c-leg-bg);color:var(--c-leg-tx);border-left-color:var(--c-leg-bd)}
.idea-chip.cer{background:var(--c-cer-bg);color:var(--c-cer-tx);border-left-color:var(--c-cer-bd)}
.idea-chip.hue{background:var(--c-hue-bg);color:var(--c-hue-tx);border-left-color:var(--c-hue-bd)}
.idea-chip.lac{background:var(--c-lac-bg);color:var(--c-lac-tx);border-left-color:var(--c-lac-bd)}
.idea-chip.psb{background:var(--c-psb-bg);color:var(--c-psb-tx);border-left-color:var(--c-psb-bd)}
.idea-chip.psa{background:var(--c-psa-bg);color:var(--c-psa-tx);border-left-color:var(--c-psa-bd)}
.idea-chip.cab{background:var(--c-cab-bg);color:var(--c-cab-tx);border-left-color:var(--c-cab-bd)}
.idea-chip.car{background:var(--c-car-bg);color:var(--c-car-tx);border-left-color:var(--c-car-bd)}
.idea-chip.piz{background:var(--c-piz-bg);color:var(--c-piz-tx);border-left-color:var(--c-piz-bd)}
.main{flex:1;overflow:auto;position:relative}
/* MEAL BLOCKS */
.mblock{border-radius:0 5px 5px 0;padding:5px 8px;font-size:11px;line-height:1.3;border-left:3px solid transparent;cursor:pointer;min-height:28px;display:flex;align-items:center;justify-content:space-between;gap:4px;transition:opacity .15s}
.mblock:hover{opacity:.85}
.mblock .btxt{flex:1;min-width:0}
.bstar{background:none;border:none;cursor:pointer;font-size:13px;line-height:1;padding:0 1px;color:rgba(0,0,0,.18);flex-shrink:0;opacity:0;transition:opacity .15s,color .15s}
.mblock:hover .bstar{opacity:1}
.bstar.on{color:var(--amber)!important;opacity:1!important}
.mob-meal{border-radius:0 8px 8px 0;padding:9px 12px;font-size:13px;line-height:1.4;border-left:3px solid transparent;cursor:pointer;min-height:36px;display:flex;align-items:center;justify-content:space-between;gap:6px;user-select:none;-webkit-user-select:none}
.mob-meal .btxt{flex:1;min-width:0}
.mob-bstar{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;color:rgba(0,0,0,.18);flex-shrink:0;touch-action:manipulation}
.mob-bstar.on{color:var(--amber)!important}
.mblock.fru,.mob-meal.fru{background:var(--c-fru-bg);color:var(--c-fru-tx);border-left-color:var(--c-fru-bd)}
.mblock.verd,.mob-meal.verd{background:var(--c-verd-bg);color:var(--c-verd-tx);border-left-color:var(--c-verd-bd)}
.mblock.leg,.mob-meal.leg{background:var(--c-leg-bg);color:var(--c-leg-tx);border-left-color:var(--c-leg-bd)}
.mblock.cer,.mob-meal.cer{background:var(--c-cer-bg);color:var(--c-cer-tx);border-left-color:var(--c-cer-bd)}
.mblock.hue,.mob-meal.hue{background:var(--c-hue-bg);color:var(--c-hue-tx);border-left-color:var(--c-hue-bd)}
.mblock.lac,.mob-meal.lac{background:var(--c-lac-bg);color:var(--c-lac-tx);border-left-color:var(--c-lac-bd)}
.mblock.psb,.mob-meal.psb{background:var(--c-psb-bg);color:var(--c-psb-tx);border-left-color:var(--c-psb-bd)}
.mblock.psa,.mob-meal.psa{background:var(--c-psa-bg);color:var(--c-psa-tx);border-left-color:var(--c-psa-bd)}
.mblock.cab,.mob-meal.cab{background:var(--c-cab-bg);color:var(--c-cab-tx);border-left-color:var(--c-cab-bd)}
.mblock.car,.mob-meal.car{background:var(--c-car-bg);color:var(--c-car-tx);border-left-color:var(--c-car-bd)}
.mblock.mer,.mob-meal.mer{background:var(--c-mer-bg);color:var(--c-mer-tx);border-left-color:var(--c-mer-bd)}
.mblock.piz,.mob-meal.piz{background:var(--c-piz-bg);color:var(--c-piz-tx);border-left-color:var(--c-piz-bd)}
.mblock.fal,.mob-meal.fal{background:var(--c-fal-bg);color:var(--c-fal-tx);border-left-color:var(--c-fal-bd);font-weight:500}
.mblock.empty,.mob-meal.empty{background:var(--c-empty-bg);color:var(--c-empty-tx);border-left-color:var(--c-empty-bd);font-style:italic;font-size:10px}
/* DRAG */
.mblock.suggested,.mob-meal.suggested{opacity:0.5;border-style:dashed;font-style:italic}
.drag-over{outline:2px dashed var(--green)!important;outline-offset:-2px;opacity:.7}
.dragging{opacity:.4}
/* DESKTOP GRID */
.desktop-grid{display:none;min-width:900px}
.dg-head{display:grid;background:var(--green);position:sticky;top:0;z-index:10}
.dg-head-cell{padding:8px 10px;color:#fff;font-size:12px;font-weight:500;text-align:center;border-right:0.5px solid rgba(255,255,255,.15)}
.dg-head-cell:first-child{font-size:11px;opacity:.7;text-align:left}
.dg-head-date{font-size:18px;font-weight:500;line-height:1;display:block}
.dg-row{display:grid;border-bottom:0.5px solid var(--border)}
.dg-row-label{padding:6px 8px;background:var(--bg2);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;border-right:0.5px solid var(--border)}
.dg-row.grp .dg-row-label{background:#E8F0EB;color:var(--green);font-weight:700}
.dg-row.grp .dg-row-label.adult{background:#EFF5F2;color:var(--green-light)}
.dg-row-label.adult{color:var(--green-light)}
.dg-cell{padding:4px 6px;border-right:0.5px solid var(--border);display:flex;flex-direction:column;gap:3px;background:var(--bg)}
.dg-cell:last-child{border-right:none}
/* EDIT MODAL */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg);border-radius:16px;padding:22px;width:360px;max-width:92vw;max-height:80vh;overflow-y:auto}
.modal h4{font-size:15px;font-weight:500;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.modal-input{width:100%;border:0.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);margin-bottom:12px}
.modal-input:focus{outline:none;border-color:var(--green)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:16px}
.cat-opt{border:1px solid transparent;border-radius:8px;padding:5px 4px;font-size:10px;text-align:center;cursor:pointer;line-height:1.3;font-weight:500}
.cat-opt.on{outline:2px solid var(--green);outline-offset:1px}
.cat-opt.fru{background:var(--c-fru-bg);color:var(--c-fru-tx)}
.cat-opt.verd{background:var(--c-verd-bg);color:var(--c-verd-tx)}
.cat-opt.leg{background:var(--c-leg-bg);color:var(--c-leg-tx)}
.cat-opt.cer{background:var(--c-cer-bg);color:var(--c-cer-tx)}
.cat-opt.hue{background:var(--c-hue-bg);color:var(--c-hue-tx)}
.cat-opt.lac{background:var(--c-lac-bg);color:var(--c-lac-tx);border-color:var(--border)}
.cat-opt.psb{background:var(--c-psb-bg);color:var(--c-psb-tx)}
.cat-opt.psa{background:var(--c-psa-bg);color:var(--c-psa-tx)}
.cat-opt.cab{background:var(--c-cab-bg);color:var(--c-cab-tx)}
.cat-opt.car{background:var(--c-car-bg);color:var(--c-car-tx)}
.cat-opt.piz{background:var(--c-piz-bg);color:var(--c-piz-tx)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-sec{background:none;border:0.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted)}
.btn-pri{background:var(--green);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:#fff;font-family:'DM Sans',sans-serif}
.btn-danger{background:none;border:0.5px solid #E06666;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:#A32D2D}
/* MOBILE MENU */
.mobile-menu{display:none;flex-direction:column;height:100%}
.dscroll{overflow-x:auto;scroll-snap-type:x mandatory;display:flex;flex:1;-webkit-overflow-scrolling:touch}
.dscroll::-webkit-scrollbar{display:none}
.dslide{scroll-snap-align:start;min-width:100%;padding:12px 14px;overflow-y:auto}
.day-title{font-size:16px;font-weight:500;padding:0 0 10px;border-bottom:0.5px solid var(--border);margin-bottom:12px}
.who-block{margin-bottom:14px}
.who-hd{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:2px solid var(--green);margin-bottom:8px}
.who-lbl{font-size:15px;font-weight:500}
.who-hd.adult{border-bottom-color:var(--green-light)}
.msec{margin-bottom:10px}
.msec-lbl{font-size:14px;font-weight:700;padding:0 0 6px;color:var(--green)}
.msec-lbl.adult{color:var(--green-light)}
.msec-lbl.mer{color:#B8860B}
.mitems{display:flex;flex-direction:column;gap:4px}
.ddots{display:flex;justify-content:center;align-items:center;gap:5px;padding:6px;background:var(--bg);border-top:0.5px solid var(--border);flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.dot.on{background:var(--green);width:14px;border-radius:3px}
/* COMPRA */
.compra-wrap{display:flex;flex-direction:column;height:100%}
.add-bar{display:flex;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.add-in{flex:1;border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}
.add-in:focus{outline:none;border-color:var(--green)}
.add-btn{background:var(--green);border:none;color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer}
.store-bar{display:flex;gap:5px;padding:7px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);overflow-x:auto;flex-shrink:0}
.store-bar::-webkit-scrollbar{display:none}
.sfc{border:0.5px solid var(--border);background:var(--bg);border-radius:20px;font-size:11px;padding:4px 10px;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:'DM Sans',sans-serif}
.sfc.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.shop-scroll{flex:1;overflow-y:auto}
.shop-cat-hd{padding:8px 16px 4px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:var(--bg2);border-top:0.5px solid var(--border);position:sticky;top:0}
.shop-row{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--bg);border-bottom:0.5px solid var(--border)}
.shop-row input{width:17px;height:17px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.sname{font-size:14px;flex:1}
.shop-row.done .sname{text-decoration:line-through;color:var(--hint)}
.store-badge{font-size:11px;padding:3px 9px;border-radius:12px;background:var(--bg2);color:var(--muted);cursor:pointer;white-space:nowrap;border:0.5px solid var(--border)}
.store-badge.set{background:#D9EAD3;color:#274E13;border-color:#93C47D}
.shop-edit-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;opacity:0.5}
.shop-edit-btn:hover{opacity:1}
/* IDEAS */
.ideas-wrap{display:flex;flex-direction:column;height:100%}
.ifbar{display:flex;gap:6px;padding:8px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.sfilt{border:0.5px solid var(--amber);background:var(--bg);border-radius:20px;font-size:11px;padding:4px 12px;cursor:pointer;color:var(--amber);font-weight:500;font-family:'DM Sans',sans-serif}
.sfilt.on{background:var(--amber);color:#fff}
.ideas-scroll{flex:1;overflow-y:auto}
.idea-row{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--bg);border-bottom:0.5px solid var(--border)}
.idea-strip{width:4px;height:22px;border-radius:2px;flex-shrink:0}
.idea-txt{font-size:14px;flex:1}
.star{background:none;border:none;font-size:22px;cursor:pointer;padding:0;line-height:1;color:#CCC;touch-action:manipulation}
.star.on{color:var(--amber)}
/* SHEETS */
.sheet-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:60;display:flex;align-items:flex-end}
.sheet{background:var(--bg);border-radius:16px 16px 0 0;padding:16px 16px 28px;width:100%;max-height:80vh;overflow-y:auto}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-title{font-size:14px;font-weight:500}
.sheet-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.store-opt{padding:12px 4px;font-size:15px;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.chk{color:var(--green);font-size:18px}
.new-store-row{display:flex;gap:8px;padding:14px 0 0}
.ns-in{flex:1;border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}
.ns-in:focus{outline:none;border-color:var(--green)}
.ns-btn{background:var(--green);border:none;color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer}
.dupe-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:70;display:flex;align-items:center;justify-content:center}
.dupe-box{background:var(--bg);border-radius:14px;padding:22px 20px;width:300px;text-align:center}
.dupe-box h4{font-size:15px;font-weight:500;margin-bottom:8px}
.dupe-box p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.dupe-ok{background:var(--green);border:none;color:#fff;border-radius:8px;padding:9px 24px;font-size:13px;font-weight:500;cursor:pointer}
/* GEN MODAL */
.gen-modal{background:var(--bg);border-radius:16px;padding:20px;width:360px;max-width:92vw;max-height:80vh;overflow-y:auto}
.gen-modal h4{font-size:15px;font-weight:500;margin-bottom:4px}
.gen-modal p{font-size:12px;color:var(--muted);margin-bottom:16px}
.gen-mode-toggle{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:16px}
.gen-mode-btn{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 8px;border-radius:8px;cursor:pointer;color:var(--muted)}
.gen-mode-btn.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.gen-range{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.gen-range label{font-size:12px;color:var(--muted);white-space:nowrap}
.gen-select{border:0.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);flex:1}
.gen-days-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.gen-day-chip{border:0.5px solid var(--border);background:var(--bg);border-radius:8px;padding:7px 4px;font-size:11px;text-align:center;cursor:pointer;line-height:1.3;color:var(--muted)}
.gen-day-chip.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
/* RESPONSIVE */
@media(min-width:768px){
  .desktop-grid{display:block}
  .mobile-menu{display:none!important}
  .ddots{display:none}
  .tab span{display:inline}
}
@media(max-width:767px){
  .desktop-grid{display:none!important}
  .mobile-menu{display:flex}
  .tab span{display:none}
  .tab{padding:10px 0}
  .tab svg{width:22px;height:22px}
  .week-nav .wtxt{display:none}
}
</style>
</head>

const GH_USER='MiguelCastrilloEspina';
const GH_REPO='menu-familiar';
const GH_FILE='menu.json';
const GH_API='https://api.github.com/repos/'+GH_USER+'/'+GH_REPO+'/contents/'+GH_FILE;
function getToken(){return localStorage.getItem('gh_token')||'';}
function setToken(t){localStorage.setItem('gh_token',t);}
function showToast(msg,d){const t=document.getElementById('sync-toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d||2500);}
function setStatus(msg){const s=document.getElementById('save-status');if(s)s.textContent=msg;}
async function loadFromGitHub(){
  try{
    const res=await fetch(GH_API,{headers:{Accept:'application/vnd.github.v3+json'}});
    if(!res.ok)return false;
    const data=await res.json();
    const content=JSON.parse(atob(data.content.replace(/\n/g,'')));
    // Only load semanas if data looks clean (no garbled encoding)
    if(content.semanas){
      const sample=JSON.stringify(content.semanas);
      const hasGarbled=sample.includes('\u00c3');
      const hasBadDow=content.semanas.some(s=>s.dias&&s.dias.some(d=>d.dow==='Mie'||d.dow==='Sab'));
      if(!hasGarbled&&!hasBadDow){semanas=content.semanas;}
    }
    // Only load shopItems if clean
    if(content.shopItems){
      const shopSample=JSON.stringify(content.shopItems);
      if(!shopSample.includes('\u00c3'))shopItems=content.shopItems;
    }
    if(content.starSet)starSet=new Set(content.starSet);
    if(content.mealStars)mealStars=new Set(content.mealStars);
    if(content.ideaExtras)ideaExtras=content.ideaExtras;
    if(content.stores)stores=content.stores;
    setStatus('\u2713 Sincronizado');return true;
  }catch(e){return false;}
}
async function saveToGitHub(){
  let token=getToken();
  if(!token){token=prompt('Introduce tu GitHub Personal Access Token:');if(!token)return;setToken(token);}
  const btn=document.getElementById('save-gh-btn');
  setStatus('Guardando...');
  try{
    const getRes=await fetch(GH_API,{headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}});
    let sha='';
    if(getRes.ok){const d=await getRes.json();sha=d.sha||'';}
    const content={semanas,shopItems,starSet:[...starSet],mealStars:[...mealStars],ideaExtras,stores,savedAt:new Date().toISOString()};
    const body={message:'Men\u00fa actualizado '+new Date().toLocaleDateString('es-ES'),content:btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2)))),...(sha&&{sha})};
    const res=await fetch(GH_API,{method:'PUT',headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(res.ok){setStatus('\u2713 Guardado');showToast('\u2713 Men\u00fa guardado en GitHub');}
    else{if(res.status===401){localStorage.removeItem('gh_token');showToast('Token incorrecto');}else showToast('Error al guardar');setStatus('');}
  }catch(e){showToast('Error de conexi\u00f3n');setStatus('');}
}

// HELPERS
function getItems(dia,whoKey,sec){
  if(dia.familia)return dia.familia[sec]||[];
  if(whoKey==='ninos')return(dia.ninos||{})[sec]||[];
  return(dia.adultos||{})[sec]||[];
}
function setItems(dia,whoKey,sec,arr){
  if(dia.familia){dia.familia[sec]=arr;return;}
  if(whoKey==='ninos'){if(!dia.ninos)dia.ninos={};dia.ninos[sec]=arr;}
  else{if(!dia.adultos)dia.adultos={};dia.adultos[sec]=arr;}
}

function blockH(it,di,whoKey,sec,idx,cls){
  const c=it.c==='empty'?'empty':it.c;
  const txt=it.c==='empty'?'\u2014':it.t;
  const drag=it.c!=='empty'?'draggable="true"':'';
  // Detect if this is a category-only suggestion (text matches a CAT_LABELS value)
  const isSuggested=it.c!=='empty'&&it.c!=='fru'&&(it.t==='Postre'||Object.values(CAT_LABELS).includes(it.t));
  const sugCls=isSuggested?' suggested':'';
  const showStar=whoKey==='ninos'&&it.c!=='empty'&&it.c!=='fal'&&!isSuggested;
  const isMob=cls==='mob-meal';
  if(!showStar){
    return '<div class="'+cls+' '+c+sugCls+'" '+drag+' data-di="'+di+'" data-who="'+whoKey+'" data-sec="'+sec+'" data-idx="'+idx+'"><span class="btxt">'+txt+'</span></div>';
  }
  const sk='meal|'+it.t;
  const starred=mealStars.has(sk);
  const starCls=isMob?'mob-bstar':'bstar';
  return '<div class="'+cls+' '+c+sugCls+'" '+drag+' data-di="'+di+'" data-who="'+whoKey+'" data-sec="'+sec+'" data-idx="'+idx+'"><span class="btxt">'+txt+'</span><button class="'+starCls+(starred?' on':'')+'" data-meal-star="'+sk+'" data-meal-name="'+it.t+'" data-meal-cat="'+it.c+'">\u2605</button></div>';
}

function generateMenu(selectedIdxs){
  const dias=semanas[wk].dias;
  const toGen=new Set(selectedIdxs!=null?selectedIdxs:dias.map((_,i)=>i));
  const allFavs=getFavorites();
  const fallbacks={
    fru:[{t:'Fruta',c:'fru'},{t:'Sandia',c:'fru'}],
    verd:[{t:'Crema de verduras',c:'verd'},{t:'Ensalada',c:'verd'},{t:'Menestra',c:'verd'},{t:'Gazpacho',c:'verd'}],
    leg:[{t:'Lentejas',c:'leg'},{t:'Garbanzos',c:'leg'},{t:'Alubias',c:'leg'}],
    cer:[{t:'Arroz',c:'cer'},{t:'Pasta',c:'cer'},{t:'Pure de patata',c:'cer'},{t:'Sopa',c:'cer'}],
    hue:[{t:'Tortilla francesa',c:'hue'},{t:'Revuelto de verduras',c:'hue'},{t:'Huevo duro',c:'hue'}],
    lac:[{t:'Yogur',c:'lac'}],
    psb:[{t:'Merluza',c:'psb'},{t:'Gallo',c:'psb'}],
    psa:[{t:'Salm\u00f3n',c:'psa'}],
    cab:[{t:'Pollo plancha',c:'cab'},{t:'Pavo',c:'cab'},{t:'Pollo al curry',c:'cab'}],
    car:[{t:'Filete ternera',c:'car'},{t:'Burguer',c:'car'}]
  };
  // Count only non-generated days from cole
  const counts={};Object.keys(TARGETS).forEach(k=>counts[k]=0);
  dias.forEach((dia,di)=>{
    if(!dia.familia&&!toGen.has(di)){
      ((dia.ninos||{}).comida||[]).forEach(it=>{if(counts[it.c]!==undefined)counts[it.c]++;});
    }
  });
  const used=new Set();
  function poolFor(cats){
    const f=allFavs.filter(it=>cats.includes(it.c));
    if(f.length)return f;
    const fb=[];cats.forEach(cat=>(fallbacks[cat]||[]).forEach(it=>fb.push(it)));
    return fb.length?fb:[{t:'Fruta',c:'fru'}];
  }
  function pick(cats,exclCats,exclNames){
    const allowed=cats.filter(c=>!exclCats.includes(c));
    const src=allowed.length?[...allowed.sort((a,b)=>((TARGETS[b]||0)-(counts[b]||0))-((TARGETS[a]||0)-(counts[a]||0)))]:cats;
    // Pool must ONLY come from allowed categories - never fall back to excluded ones
    const pool=poolFor(src).filter(it=>!exclNames.includes(it.t)&&!exclCats.includes(it.c));
    const fresh=pool.filter(it=>!used.has(it.t));
    const items=fresh.length?fresh:pool.length?pool:poolFor(src);
    const item=items[Math.floor(Math.random()*Math.max(items.length,1))];
    if(!item)return{t:'',c:'empty'};
    used.add(item.t);counts[item.c]=(counts[item.c]||0)+1;
    return{...item};
  }
  // Returns a category label item (no specific dish, just the category)
  function pickCat(cats,exclCats){
    const allowed=cats.filter(c=>!exclCats.includes(c));
    const src=allowed.length?allowed:cats;
    const sorted=[...src].sort((a,b)=>((TARGETS[b]||0)-(counts[b]||0))-((TARGETS[a]||0)-(counts[a]||0)));
    const cat=sorted[0]||src[0];
    counts[cat]=(counts[cat]||0)+1;
    return{t:CAT_LABELS[cat]||cat,c:cat,suggested:true};
  }

  dias.forEach((dia,di)=>{
    if(!toGen.has(di))return;
    const isWeekend=!!dia.familia;
    if(!isWeekend){
      const coleCats=((dia.ninos||{}).comida||[]).map(it=>it.c).filter(c=>c!=='empty'&&c!=='fal');

      // Ninos cena: avoid cole categories
      const s0=pickCat(['verd','leg','cer'],coleCats.filter(c=>['verd','leg','cer'].includes(c)));
      const s1=pickCat(['cab','car','psb','psa','hue'],[...coleCats.filter(c=>['cab','car','psb','psa','hue'].includes(c)),s0.c]);
      const s2={t:'Postre',c:'fru'};
      dia.ninos.cena=[s0,s1,s2];

      if(!dia.adultos)dia.adultos={comida:[],cena:[]};
      // Adultos comida: independent suggestions, avoid what ninos have at cena (so lunch+dinner don't repeat)
      const a0=pickCat(['verd','leg','cer'],[s0.c]);
      const a1=pickCat(['cab','car','psb','psa','hue'],[s1.c,a0.c]);
      dia.adultos.comida=[a0,a1,{t:'',c:'empty'}];
      // Adultos cena: same as ninos cena
      dia.adultos.cena=[{...s0},{...s1},{t:'',c:'empty'}];
    }
    if(isWeekend){
      const c0=pickCat(['verd','leg','cer'],[]);
      const c1=pickCat(['cab','car','psb','psa','hue'],[c0.c]);
      const c2={t:'Postre',c:'fru'};
      dia.familia.comida=[c0,c1,c2];
      // merienda: leave untouched
      const cn0=pickCat(['verd','leg','cer'],[c0.c]);
      const cn1=pickCat(['cab','car','psb','psa','hue'],[c1.c,cn0.c]);
      const cn2={t:CAT_LABELS['lac'],c:'lac'};
      dia.familia.cena=[cn0,cn1,cn2];
    }
  });
  save();render();
}

function openDayCalendar(){
  const today=new Date();
  const todayDate=today.getDate().toString();
  const todayMonthShort=today.toLocaleString('es-ES',{month:'short'}).slice(0,3).toLowerCase();
  let todayWk=-1,todayIdx=-1;
  for(let w=0;w<semanas.length;w++){
    const idx=semanas[w].dias.findIndex(d=>d.date===todayDate&&d.month.toLowerCase().startsWith(todayMonthShort));
    if(idx>=0){todayWk=w;todayIdx=idx;break;}
  }
  const dias=semanas[wk].dias;
  const todayInCur=todayWk===wk?todayIdx:-1;
  let todayLabel='Hoy';
  if(todayWk>=0){const d=semanas[todayWk].dias[todayIdx];todayLabel='Hoy \u2014 '+d.dow+' '+d.date+' '+d.month;}
  let h='<div class="sheet-ov" id="cal-sheet-ov"><div class="sheet"><div class="sheet-hdr"><span class="sheet-title">Elige un d\u00eda</span><button class="sheet-close" data-close-sheet>\u00d7</button></div>';
  h+='<button class="btn-pri" style="width:100%;margin-bottom:14px" data-pick-day="'+(todayIdx>=0?todayIdx:0)+'" data-pick-wk="'+(todayWk>=0?todayWk:wk)+'">'+todayLabel+'</button>';
  dias.forEach((d,i)=>{
    const isToday=i===todayInCur;
    h+='<div class="store-opt" data-pick-day="'+i+'" data-pick-wk="'+wk+'" style="'+(i===mSlide?'font-weight:600;color:var(--green)':'')+'">'+(d.dow+' '+d.date+' '+d.month)+(isToday?' \u2014 hoy':'')+(i===mSlide?' \u2713':'')+'</div>';
  });
  h+='</div></div>';
  document.getElementById('main').insertAdjacentHTML('beforeend',h);
}

// RENDER
// IDEAS PANEL
function getUsedThisWeek(){
  const used=new Set();
  semanas[wk].dias.forEach(dia=>{
    ['comida','merienda','cena'].forEach(sec=>{
      const items=dia.familia?dia.familia[sec]||[]:
        [...((dia.ninos||{})[sec]||[]),...((dia.adultos||{})[sec]||[])];
      items.forEach(it=>{if(it.t&&it.c!=='empty')used.add(it.t);});
    });
  });
  return used;
}

function renderIdeasPanel(){
  const grid=document.getElementById('ideas-panel-grid');
  if(!grid)return;
  const used=getUsedThisWeek();
  const counts=countCats();
  const catCodeMap={'Verduras':'verd','Huevos':'hue','Legumbres':'leg','Cereales':'cer',
    'Pescado blanco':'psb','Pescado azul':'psa','Carne blanca':'cab','Carne roja':'car','Fruta':'fru'};
  const sortedCats=[...ideasData].sort((a,b)=>{
    const ca=catCodeMap[a.cat]||'verd',cb=catCodeMap[b.cat]||'verd';
    return((TARGETS[cb]||0)-(counts[cb]||0))-((TARGETS[ca]||0)-(counts[ca]||0));
  });
  grid.innerHTML=sortedCats.map(cat=>{
    const code=catCodeMap[cat.cat]||'verd';
    const need=Math.max(0,(TARGETS[code]||0)-(counts[code]||0));
    const extras=ideaExtras[cat.cat]||[];
    const favs=[...cat.items,...extras].filter(t=>starSet.has(cat.cat+'|'+t)||mealStars.has('meal|'+t));
    const others=[...cat.items,...extras].filter(t=>!favs.includes(t));
    const all=[...favs,...others];
    if(!all.length)return'';
    return'<div class="ideas-cat-group">'+
      '<div class="ideas-cat-lbl" style="color:'+cat.col+'">'+cat.cat+(need>0?' (faltan '+need+')':'')+'</div>'+
      all.map(t=>'<div class="idea-chip '+code+(used.has(t)?' used':'')
        +'" draggable="true" data-idea-name="'+t+'" data-idea-cat="'+code+'">'
        +(favs.includes(t)?'\u2605 ':'')+t+'</div>').join('')+
    '</div>';
  }).join('');
}

  document.getElementById('wlbl').textContent=semanas[wk].label;buildCtrl();

  const shopEditBtn=e.target.closest('[data-edit-ci]');

  const ideaEditBtn=e.target.closest('[data-edit-idea-cat]');

  if(e.target.id==='shop-item-save'){

// DRAG & DROP
let dragSrc=null,touchClone=null,touchMoved=false,touchStartEl=null,longPressTimer=null;

function getBlockFromPoint(x,y){
  if(touchClone)touchClone.style.display='none';
  const el=document.elementFromPoint(x,y);
  if(touchClone)touchClone.style.display='';
  return el?el.closest('[data-di][data-who][data-sec][data-idx]'):null;
}
function doSwap(dst){
  if(!dragSrc||!dst)return;
  if(dst.di===dragSrc.di&&dst.whoKey===dragSrc.whoKey&&dst.sec===dragSrc.sec&&dst.idx===dragSrc.idx)return;
  const srcDia=semanas[wk].dias[dragSrc.di];
  const dstDia=semanas[wk].dias[dst.di];

  // Get items using effective whoKey (familia days have their own data)
  const srcEffective=srcDia.familia?'familia':dragSrc.whoKey;
  const dstEffective=dstDia.familia?'familia':dst.whoKey;

  const srcItems=getItems(srcDia,srcEffective,dragSrc.sec);
  const dstItems=getItems(dstDia,dstEffective,dst.sec);

  while(srcItems.length<=dragSrc.idx)srcItems.push({t:'',c:'empty'});
  while(dstItems.length<=dst.idx)dstItems.push({t:'',c:'empty'});

  const srcItem={...srcItems[dragSrc.idx]};
  const dstItem={...dstItems[dst.idx]};

  // Same day + same whoKey = swap. Otherwise = copy only to destination
  const sameGroup=(dragSrc.di===dst.di&&srcEffective===dstEffective);
  if(sameGroup){
    srcItems[dragSrc.idx]=dstItem;
    dstItems[dst.idx]=srcItem;
  } else {
    dstItems[dst.idx]=srcItem;
  }

  setItems(srcDia,srcEffective,dragSrc.sec,srcItems);
  setItems(dstDia,dstEffective,dst.sec,dstItems);
  save();render();
}

document.getElementById('main').addEventListener('dragstart',e=>{
  const chip=e.target.closest('[data-idea-name]');
  if(chip){
    dragSrc={fromPanel:true,name:chip.dataset.ideaName,cat:chip.dataset.ideaCat};
    e.dataTransfer.effectAllowed='copy';return;
  }
  const el=e.target.closest('[draggable=true][data-di]');if(!el)return;
  dragSrc={di:+el.dataset.di,whoKey:el.dataset.who,sec:el.dataset.sec,idx:+el.dataset.idx};
  el.classList.add('dragging');e.dataTransfer.effectAllowed='move';
});
document.getElementById('main').addEventListener('dragend',e=>{
  document.querySelectorAll('.dragging,.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));dragSrc=null;
});
document.getElementById('main').addEventListener('dragover',e=>{
  const el=e.target.closest('[data-di][data-who][data-sec][data-idx]');if(!el||!dragSrc)return;
  e.preventDefault();document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));el.classList.add('drag-over');
});
document.getElementById('main').addEventListener('dragleave',e=>{
  const el=e.target.closest('[data-di][data-who][data-sec][data-idx]');if(el)el.classList.remove('drag-over');
});
document.getElementById('main').addEventListener('drop',e=>{
  e.preventDefault();
  const el=e.target.closest('[data-di][data-who][data-sec][data-idx]');if(!el||!dragSrc)return;
  el.classList.remove('drag-over');
  if(dragSrc.fromPanel){
    // Drop from ideas panel \u2014 place into target block
    const dst={di:+el.dataset.di,whoKey:el.dataset.who,sec:el.dataset.sec,idx:+el.dataset.idx};
    const dstDia=semanas[wk].dias[dst.di];
    const dstItems=getItems(dstDia,dst.whoKey,dst.sec);
    while(dstItems.length<=dst.idx)dstItems.push({t:'',c:'empty'});
    dstItems[dst.idx]={t:dragSrc.name,c:dragSrc.cat};
    setItems(dstDia,dst.whoKey,dst.sec,dstItems);
    save();render();dragSrc=null;return;
  }
  doSwap({di:+el.dataset.di,whoKey:el.dataset.who,sec:el.dataset.sec,idx:+el.dataset.idx});dragSrc=null;
});

document.getElementById('main').addEventListener('touchstart',e=>{
  const el=e.target.closest('[draggable=true][data-di]');if(!el)return;
  if(e.target.closest('[data-meal-star]'))return;
  touchStartEl=el;touchMoved=false;
  longPressTimer=setTimeout(()=>{
    if(!touchMoved&&touchStartEl===el){
      dragSrc={di:+el.dataset.di,whoKey:el.dataset.who,sec:el.dataset.sec,idx:+el.dataset.idx};
      const rect=el.getBoundingClientRect();
      touchClone=el.cloneNode(true);
      touchClone.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:0.75;pointer-events:none;z-index:9999;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,.25);';
      document.body.appendChild(touchClone);el.style.opacity='0.3';
      if(navigator.vibrate)navigator.vibrate(40);
    }
  },400);
},{passive:true});

document.addEventListener('touchmove',e=>{
  touchMoved=true;
  if(longPressTimer&&!dragSrc){clearTimeout(longPressTimer);longPressTimer=null;}
  if(!dragSrc||!touchClone)return;
  e.preventDefault();
  const touch=e.touches[0];
  touchClone.style.left=(touch.clientX-touchClone.offsetWidth/2)+'px';
  touchClone.style.top=(touch.clientY-30)+'px';
  const over=getBlockFromPoint(touch.clientX,touch.clientY);
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  if(over)over.classList.add('drag-over');
},{passive:false});

document.addEventListener('touchend',e=>{
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
  touchStartEl=null;
  if(!dragSrc)return;
  const touch=e.changedTouches[0];
  const over=getBlockFromPoint(touch.clientX,touch.clientY);
  document.querySelectorAll('[style*="opacity: 0.3"],[style*="opacity:0.3"]').forEach(el=>el.style.opacity='');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(touchClone){touchClone.remove();touchClone=null;}
  if(over)doSwap({di:+over.dataset.di,whoKey:over.dataset.who,sec:over.dataset.sec,idx:+over.dataset.idx});
  dragSrc=null;
},{passive:true});

// INIT
function findTodaySlide(){
  const today=new Date();
  const todayDate=today.getDate().toString();
  const todayMonth=today.toLocaleString('es-ES',{month:'short'}).slice(0,3).toLowerCase();
  for(let w=0;w<semanas.length;w++){
    const idx=semanas[w].dias.findIndex(d=>d.date===todayDate&&d.month.toLowerCase().startsWith(todayMonth));
    if(idx>=0){wk=w;mSlide=idx;return;}
  }
}
