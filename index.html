<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menú Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#3A6B4A;--border:#DDD5C8;--text:#2A2420;--muted:#7A6E68;--hint:#AAA09A;
  --bg:#fff;--bg2:#F7F3EC;--bg3:#F0EBE3;--amber:#D4A017;
  --c-fru-bg:#D9EAD3;--c-fru-tx:#274E13;--c-fru-bd:#93C47D;
  --c-verd-bg:#274E13;--c-verd-tx:#fff;--c-verd-bd:#38761D;
  --c-leg-bg:#F6B26B;--c-leg-tx:#783F04;--c-leg-bd:#E69138;
  --c-cer-bg:#FFE599;--c-cer-tx:#7F6000;--c-cer-bd:#FFD966;
  --c-hue-bg:#7F6000;--c-hue-tx:#fff;--c-hue-bd:#7F6000;
  --c-lac-bg:#fff;--c-lac-tx:#444;--c-lac-bd:#DDD5C8;
  --c-psb-bg:#4A86E8;--c-psb-tx:#fff;--c-psb-bd:#1155CC;
  --c-psa-bg:#9FC5E8;--c-psa-tx:#1A3A5C;--c-psa-bd:#6FA8DC;
  --c-cab-bg:#EA9999;--c-cab-tx:#4C1130;--c-cab-bd:#CC4125;
  --c-car-bg:#E06666;--c-car-tx:#fff;--c-car-bd:#CC0000;
  --c-mer-bg:#F3EDF8;--c-mer-tx:#4A2A6B;--c-mer-bd:#7B5EA7;
  --c-piz-bg:#FDF0E8;--c-piz-tx:#7A3A10;--c-piz-bd:#C45A20;
  --c-fal-bg:#FCEBEB;--c-fal-tx:#A32D2D;--c-fal-bd:#A32D2D;
  --c-empty-bg:#F7F3EC;--c-empty-tx:#AAA09A;--c-empty-bd:#DDD5C8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg3);color:var(--text)}
body{overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* TOPBAR */
.topbar{background:var(--green);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-t{color:#fff;font-size:18px;font-weight:500;letter-spacing:-.02em}
.topbar-t em{font-style:italic;color:#A8D4B4}
.week-nav{display:flex;align-items:center;gap:8px}
.wbtn{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wbtn:hover{background:rgba(255,255,255,.3)}
.wtxt{color:#fff;font-size:12px;font-weight:500;white-space:nowrap}
.save-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;font-size:11px;padding:4px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:5px}
.save-btn:hover{background:rgba(255,255,255,.25)}
.save-btn.saving{opacity:.6;pointer-events:none}
.save-status{font-size:10px;color:rgba(255,255,255,.7);white-space:nowrap}
.sync-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2A2420;color:#fff;font-size:12px;padding:8px 16px;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-toast.show{opacity:1}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif}
.tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.tab.on{color:var(--green);border-bottom-color:var(--green);font-weight:500}

/* CTRL */
.ctrl{display:none;align-items:center;gap:6px;padding:8px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.chip{border:0.5px solid var(--border);background:var(--bg);border-radius:20px;font-size:11px;padding:4px 10px;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:'DM Sans',sans-serif}
.chip.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.chip-div{width:1px;height:14px;background:var(--border)}
.hint-txt{font-size:11px;color:var(--hint);margin-left:4px}
.btn-gen{background:var(--green);border:none;color:#fff;border-radius:20px;font-size:11px;padding:4px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;margin-left:auto;white-space:nowrap}
.btn-gen:hover{background:#2E5A3E}

/* BALANCE PANEL */
.balance-panel{padding:10px 16px 8px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.balance-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.balance-toggle{font-size:10px;color:var(--green);cursor:pointer;font-weight:500}
.balance-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
@media(max-width:767px){.balance-grid{grid-template-columns:repeat(5,1fr)}}
.bal-item{display:flex;flex-direction:column;gap:3px}
.bal-label{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bal-bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bal-bar{height:100%;border-radius:4px;transition:width .3s}
.bal-bar.ok{background:var(--green)}
.bal-bar.low{background:#E69138}
.bal-bar.over{background:#4A86E8}
.bal-count{font-size:9px;color:var(--muted);text-align:right}

.main{flex:1;overflow:auto;position:relative}

/* ── MEAL BLOCK ── */
.mblock{border-radius:0 5px 5px 0;padding:5px 8px 5px 8px;font-size:11px;line-height:1.3;border-left:3px solid transparent;cursor:pointer;min-height:28px;display:flex;align-items:center;justify-content:space-between;gap:4px;transition:opacity .15s}
.mblock:hover{opacity:.85}
.mblock .btxt{flex:1;min-width:0}
.bstar{background:none;border:none;cursor:pointer;font-size:13px;line-height:1;padding:0 1px;color:rgba(0,0,0,.18);flex-shrink:0;opacity:0;transition:opacity .15s, color .15s}
.mblock:hover .bstar{opacity:1}
.bstar.on{color:var(--amber)!important;opacity:1!important}
/* mobile: always show star */
.mob-meal{border-radius:0 8px 8px 0;padding:9px 12px;font-size:13px;line-height:1.4;border-left:3px solid transparent;cursor:pointer;min-height:36px;display:flex;align-items:center;justify-content:space-between;gap:6px;touch-action:none}
.mob-meal .btxt{flex:1;min-width:0}
.mob-bstar{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;color:rgba(0,0,0,.18);flex-shrink:0;touch-action:manipulation}
.mob-bstar.on{color:var(--amber)!important}
.mblock.fru{background:var(--c-fru-bg);color:var(--c-fru-tx);border-left-color:var(--c-fru-bd)}
.mblock.verd{background:var(--c-verd-bg);color:var(--c-verd-tx);border-left-color:var(--c-verd-bd)}
.mblock.leg{background:var(--c-leg-bg);color:var(--c-leg-tx);border-left-color:var(--c-leg-bd)}
.mblock.cer{background:var(--c-cer-bg);color:var(--c-cer-tx);border-left-color:var(--c-cer-bd)}
.mblock.hue{background:var(--c-hue-bg);color:var(--c-hue-tx);border-left-color:var(--c-hue-bd)}
.mblock.lac{background:var(--c-lac-bg);color:var(--c-lac-tx);border-left-color:var(--c-lac-bd)}
.mblock.psb{background:var(--c-psb-bg);color:var(--c-psb-tx);border-left-color:var(--c-psb-bd)}
.mblock.psa{background:var(--c-psa-bg);color:var(--c-psa-tx);border-left-color:var(--c-psa-bd)}
.mblock.cab{background:var(--c-cab-bg);color:var(--c-cab-tx);border-left-color:var(--c-cab-bd)}
.mblock.car{background:var(--c-car-bg);color:var(--c-car-tx);border-left-color:var(--c-car-bd)}
.mblock.mer{background:var(--c-mer-bg);color:var(--c-mer-tx);border-left-color:var(--c-mer-bd)}
.mblock.piz{background:var(--c-piz-bg);color:var(--c-piz-tx);border-left-color:var(--c-piz-bd)}
.mblock.fal{background:var(--c-fal-bg);color:var(--c-fal-tx);border-left-color:var(--c-fal-bd);font-weight:500}
.mblock.empty{background:var(--c-empty-bg);color:var(--c-empty-tx);border-left-color:var(--c-empty-bd);font-style:italic;font-size:10px}

/* ── DESKTOP GRID ── */
.desktop-grid{display:none;min-width:900px}
.dg-head{display:grid;background:var(--green);position:sticky;top:0;z-index:10}
.dg-head-cell{padding:8px 10px;color:#fff;font-size:12px;font-weight:500;text-align:center;border-right:0.5px solid rgba(255,255,255,.15)}
.dg-head-cell:first-child{font-size:11px;opacity:.7;text-align:left}
.dg-head-date{font-size:18px;font-weight:500;line-height:1;display:block}
.dg-row{display:grid;border-bottom:0.5px solid var(--border)}
.dg-row-label{padding:6px 8px;background:var(--bg2);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;border-right:0.5px solid var(--border)}
.dg-row.grp .dg-row-label{background:#E8F0EB;color:var(--green);font-weight:700}
.dg-cell{padding:4px 6px;border-right:0.5px solid var(--border);display:flex;flex-direction:column;gap:3px;background:var(--bg)}
.dg-cell:last-child{border-right:none}

/* ── EDIT MODAL ── */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg);border-radius:16px;padding:22px;width:360px;max-width:92vw}
.modal h4{font-size:15px;font-weight:500;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.modal-input{width:100%;border:0.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);margin-bottom:12px}
.modal-input:focus{outline:none;border-color:var(--green)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:16px}
.cat-opt{border:1px solid transparent;border-radius:8px;padding:6px 4px;font-size:10px;text-align:center;cursor:pointer;line-height:1.3;font-weight:500}
.cat-opt.fru{background:var(--c-fru-bg);color:var(--c-fru-tx);border-color:var(--c-fru-bd)}
.cat-opt.verd{background:var(--c-verd-bg);color:var(--c-verd-tx);border-color:var(--c-verd-bd)}
.cat-opt.leg{background:var(--c-leg-bg);color:var(--c-leg-tx);border-color:var(--c-leg-bd)}
.cat-opt.cer{background:var(--c-cer-bg);color:var(--c-cer-tx);border-color:var(--c-cer-bd)}
.cat-opt.hue{background:var(--c-hue-bg);color:var(--c-hue-tx);border-color:var(--c-hue-bd)}
.cat-opt.lac{background:var(--c-lac-bg);color:var(--c-lac-tx);border-color:var(--c-lac-bd)}
.cat-opt.psb{background:var(--c-psb-bg);color:var(--c-psb-tx);border-color:var(--c-psb-bd)}
.cat-opt.psa{background:var(--c-psa-bg);color:var(--c-psa-tx);border-color:var(--c-psa-bd)}
.cat-opt.cab{background:var(--c-cab-bg);color:var(--c-cab-tx);border-color:var(--c-cab-bd)}
.cat-opt.car{background:var(--c-car-bg);color:var(--c-car-tx);border-color:var(--c-car-bd)}
.cat-opt.piz{background:var(--c-piz-bg);color:var(--c-piz-tx);border-color:var(--c-piz-bd)}
.cat-opt.on{outline:3px solid var(--green);outline-offset:1px}

/* ── DRAG & DROP ── */
.mblock[draggable=true],.mob-meal[draggable=true]{cursor:grab}
.mblock[draggable=true]:active,.mob-meal[draggable=true]:active{cursor:grabbing}
.drag-over{outline:2px dashed var(--green)!important;outline-offset:-2px;opacity:.7}
.dragging{opacity:.4}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-sec{background:none;border:0.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted)}
.btn-pri{background:var(--green);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:#fff;font-family:'DM Sans',sans-serif}
.btn-danger{background:none;border:0.5px solid #E06666;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:#A32D2D}

/* ── MOBILE MENU ── */
.mobile-menu{display:none;flex-direction:column;height:100%}
.dscroll{overflow-x:auto;scroll-snap-type:x mandatory;display:flex;flex:1;-webkit-overflow-scrolling:touch}
.dscroll::-webkit-scrollbar{display:none}
.dslide{scroll-snap-align:start;min-width:100%;padding:12px 14px;overflow-y:auto}
.day-title{font-size:16px;font-weight:500;padding:0 0 10px;border-bottom:0.5px solid var(--border);margin-bottom:12px}
.who-block{margin-bottom:14px}
.who-hd{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:2px solid var(--green);margin-bottom:8px}
.who-em{font-size:16px}
.who-lbl{font-size:15px;font-weight:500}
.msec{margin-bottom:10px}
.msec-lbl{font-size:13px;font-weight:700;padding:0 0 6px;color:var(--text)}
.msec-lbl.mer{color:#B8860B}
.mitems{display:flex;flex-direction:column;gap:4px}
.mob-meal.fru{background:var(--c-fru-bg);color:var(--c-fru-tx);border-left-color:var(--c-fru-bd)}
.mob-meal.verd{background:var(--c-verd-bg);color:var(--c-verd-tx);border-left-color:var(--c-verd-bd)}
.mob-meal.leg{background:var(--c-leg-bg);color:var(--c-leg-tx);border-left-color:var(--c-leg-bd)}
.mob-meal.cer{background:var(--c-cer-bg);color:var(--c-cer-tx);border-left-color:var(--c-cer-bd)}
.mob-meal.hue{background:var(--c-hue-bg);color:var(--c-hue-tx);border-left-color:var(--c-hue-bd)}
.mob-meal.lac{background:var(--c-lac-bg);color:var(--c-lac-tx);border-left-color:var(--c-lac-bd)}
.mob-meal.psb{background:var(--c-psb-bg);color:var(--c-psb-tx);border-left-color:var(--c-psb-bd)}
.mob-meal.psa{background:var(--c-psa-bg);color:var(--c-psa-tx);border-left-color:var(--c-psa-bd)}
.mob-meal.cab{background:var(--c-cab-bg);color:var(--c-cab-tx);border-left-color:var(--c-cab-bd)}
.mob-meal.car{background:var(--c-car-bg);color:var(--c-car-tx);border-left-color:var(--c-car-bd)}
.mob-meal.mer{background:var(--c-mer-bg);color:var(--c-mer-tx);border-left-color:var(--c-mer-bd)}
.mob-meal.piz{background:var(--c-piz-bg);color:var(--c-piz-tx);border-left-color:var(--c-piz-bd)}
.mob-meal.fal{background:var(--c-fal-bg);color:var(--c-fal-tx);border-left-color:var(--c-fal-bd);font-weight:500}
.mob-meal.empty{background:var(--c-empty-bg);color:var(--c-empty-tx);border-left-color:var(--c-empty-bd);font-style:italic;font-size:12px}
.ddots{display:flex;justify-content:center;align-items:center;gap:5px;padding:6px;background:var(--bg);border-top:0.5px solid var(--border);flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .2s}
.dot.on{background:var(--green);width:14px;border-radius:3px}

/* ── COMPRA ── */
.compra-wrap{display:flex;flex-direction:column;height:100%}
.add-bar{display:flex;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.add-in{flex:1;border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}
.add-in:focus{outline:none;border-color:var(--green)}
.add-btn{background:var(--green);border:none;color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer}
.store-bar{display:flex;gap:5px;padding:7px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);overflow-x:auto;flex-shrink:0}
.store-bar::-webkit-scrollbar{display:none}
.sfc{border:0.5px solid var(--border);background:var(--bg);border-radius:20px;font-size:11px;padding:4px 10px;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:'DM Sans',sans-serif}
.sfc.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:500}
.shop-scroll{flex:1;overflow-y:auto}
.shop-cat-hd{padding:8px 16px 4px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);background:var(--bg2);border-top:0.5px solid var(--border);position:sticky;top:0}
.shop-row{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--bg);border-bottom:0.5px solid var(--border)}
.shop-row input{width:17px;height:17px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.sname{font-size:14px;flex:1}
.shop-row.done .sname{text-decoration:line-through;color:var(--hint)}
.store-badge{font-size:11px;padding:3px 9px;border-radius:12px;background:var(--bg2);color:var(--muted);cursor:pointer;white-space:nowrap;border:0.5px solid var(--border)}
.store-badge.set{background:#D9EAD3;color:#274E13;border-color:#93C47D}
.shop-edit-btn{background:none;border:none;font-size:13px;cursor:pointer;padding:0 2px;opacity:0.4;flex-shrink:0}
.shop-edit-btn:hover{opacity:1}
@media(max-width:767px){.shop-edit-btn{opacity:0.6}}

/* ── IDEAS ── */
.ideas-wrap{display:flex;flex-direction:column;height:100%}
.ifbar{display:flex;gap:6px;padding:8px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0}
.sfilt{border:0.5px solid var(--amber);background:var(--bg);border-radius:20px;font-size:11px;padding:4px 12px;cursor:pointer;color:var(--amber);font-weight:500;font-family:'DM Sans',sans-serif}
.sfilt.on{background:var(--amber);color:#fff}
.ideas-scroll{flex:1;overflow-y:auto}
.idea-row{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--bg);border-bottom:0.5px solid var(--border)}
.idea-strip{width:4px;height:22px;border-radius:2px;flex-shrink:0}
.idea-txt{font-size:14px;flex:1}
.star{background:none;border:none;font-size:22px;cursor:pointer;padding:0;line-height:1;color:#CCC;touch-action:manipulation}
.star.on{color:var(--amber)}

/* ── SHEET / MODAL ── */
.sheet-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:60;display:flex;align-items:flex-end}
.sheet{background:var(--bg);border-radius:16px 16px 0 0;padding:16px 16px 28px;width:100%;max-height:70vh;overflow-y:auto}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-title{font-size:14px;font-weight:500}
.sheet-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.store-opt{padding:12px 4px;font-size:15px;border-bottom:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.store-opt .chk{color:var(--green);font-size:18px}
.new-store-row{display:flex;gap:8px;padding:14px 0 0}
.ns-in{flex:1;border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}
.ns-in:focus{outline:none;border-color:var(--green)}
.ns-btn{background:var(--green);border:none;color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer}
.dupe-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:70;display:flex;align-items:center;justify-content:center}
.dupe-box{background:var(--bg);border-radius:14px;padding:22px 20px;width:300px;text-align:center}
.dupe-box h4{font-size:15px;font-weight:500;margin-bottom:8px}
.dupe-box p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.dupe-ok{background:var(--green);border:none;color:#fff;border-radius:8px;padding:9px 24px;font-size:13px;font-weight:500;cursor:pointer}

/* ── RESPONSIVE ── */
@media(min-width:768px){
  .desktop-grid{display:block}

// ── GITHUB SYNC ───────────────────────────────────────────────────────────
const GH_USER='MiguelCastrilloEspina';
const GH_REPO='menu-familiar';
const GH_FILE='menu.json';
const GH_API=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

function getToken(){return localStorage.getItem('gh_token')||'';}
function setToken(t){localStorage.setItem('gh_token',t);}

function showToast(msg,duration=2500){
  const t=document.getElementById('sync-toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}

function setStatus(msg){
  const s=document.getElementById('save-status');
  if(s)s.textContent=msg;
}

async function loadFromGitHub(){
  try{
    const res=await fetch(GH_API,{headers:{Accept:'application/vnd.github.v3+json'}});
    if(!res.ok)return false;
    const data=await res.json();
    const content=JSON.parse(atob(data.content.replace(/\n/g,'')));
    // restore state from GitHub
    if(content.semanas)semanas=content.semanas;
    if(content.shopItems)shopItems=content.shopItems;
    if(content.starSet)starSet=new Set(content.starSet);
    if(content.mealStars)mealStars=new Set(content.mealStars);
    if(content.ideaExtras)ideaExtras=content.ideaExtras;
    if(content.stores)stores=content.stores;
    // also update localStorage
    save();
    setStatus('✓ Sincronizado');
    return true;
  }catch(e){
    return false;
  }
}

async function saveToGitHub(){
  let token=getToken();
  if(!token){
    token=prompt('Introduce tu GitHub Personal Access Token:');
    if(!token)return;
    setToken(token);
  }
  const btn=document.getElementById('save-gh-btn');
  btn.classList.add('saving');
  btn.querySelector('span')||btn;
  setStatus('Guardando...');
  try{
    // get current SHA (needed for update)
    const getRes=await fetch(GH_API,{headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}});
    let sha='';
    if(getRes.ok){const d=await getRes.json();sha=d.sha||'';}
    // build content
    const content={
      semanas,shopItems,
      starSet:[...starSet],
      mealStars:[...mealStars],
      ideaExtras,stores,
      savedAt:new Date().toISOString()
    };
    const body={
      message:`Menú actualizado ${new Date().toLocaleDateString('es-ES')}`,
      content:btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2)))),
      ...(sha&&{sha})
    };
    const res=await fetch(GH_API,{
      method:'PUT',
      headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(res.ok){
      setStatus('✓ Guardado');
      showToast('✓ Menú guardado en GitHub');
    } else {
      const err=await res.json();
      if(res.status===401){
        localStorage.removeItem('gh_token');
        showToast('Token incorrecto — inténtalo de nuevo');
      } else {
        showToast('Error al guardar: '+( err.message||res.status));
      }
      setStatus('');
    }
  }catch(e){
    showToast('Error de conexión');
    setStatus('');
  }
  btn.classList.remove('saving');
}

function getItems(dia,whoKey,sec){
  if(dia.familia)return dia.familia[sec]||[];
  if(whoKey==='ninos')return(dia.ninos||{})[sec]||[];
  return(dia.adultos||{})[sec]||[];
}
function setItems(dia,whoKey,sec,arr){
  if(dia.familia){dia.familia[sec]=arr;return;}
  if(whoKey==='ninos'){if(!dia.ninos)dia.ninos={};dia.ninos[sec]=arr;}
  else{if(!dia.adultos)dia.adultos={};dia.adultos[sec]=arr;}
}
function blockH(it,di,whoKey,sec,idx,cls){
  const c=it.c==='empty'?'empty':it.c;
  const txt=it.c==='empty'?'—':it.t;
  const drag=it.c!=='empty'?'draggable="true"':'';
  const showStar=whoKey==='ninos'&&it.c!=='empty'&&it.c!=='fal';
  const isMob=cls==='mob-meal';
  if(!showStar){
    return`<div class="${cls} ${c}" ${drag} data-di="${di}" data-who="${whoKey}" data-sec="${sec}" data-idx="${idx}"><span class="btxt">${txt}</span></div>`;
  }
  const sk='meal|'+it.t;
  const starred=mealStars.has(sk);
  const starCls=isMob?'mob-bstar':'bstar';
  return`<div class="${cls} ${c}" ${drag} data-di="${di}" data-who="${whoKey}" data-sec="${sec}" data-idx="${idx}">
    <span class="btxt">${txt}</span><button class="${starCls} ${starred?'on':''}" data-meal-star="${sk}" data-meal-name="${it.t}" data-meal-cat="${it.c}" aria-label="favorito">★</button>
  </div>`;
}

function toggleMealStar(sk,name,catCode,btn){
  if(mealStars.has(sk)){
    mealStars.delete(sk);
    btn.classList.remove('on');
    // also unmark in starSet (find which ideas category it belongs to)
    for(const cat of ideasData){
      starSet.delete(cat.cat+'|'+name);
    }
  } else {
    mealStars.add(sk);
    btn.classList.add('on');
    // add to ideaExtras under the right category if not already in ideasData
    const ideasCat=guessIdeaCat(name);
    const existsInBase=ideasData.some(cat=>cat.items.includes(name));
    const existsInExtras=Object.values(ideaExtras).some(arr=>arr.includes(name));
    if(!existsInBase&&!existsInExtras){
      if(!ideaExtras[ideasCat])ideaExtras[ideasCat]=[];
      ideaExtras[ideasCat].push(name);
    }
    // mark as starred in starSet
    const ideaCat=ideasData.find(c=>c.items.includes(name));
    const key=(ideaCat?ideaCat.cat:ideasCat)+'|'+name;
    starSet.add(key);
  }
  save();
}

// ── MENU GENERATOR ────────────────────────────────────────────────────────
function getFavorites(catCode){
  // get all starred meal names of a given category (or any if catCode null)
  const favs=[];
  for(const cat of ideasData){
    cat.items.forEach(name=>{
      const k=cat.cat+'|'+name;
      if(starSet.has(k)){
        const mCat=catToCode(cat.cat);
        if(!catCode||mCat===catCode)favs.push({t:name,c:mCat});
      }
    });
    (ideaExtras[cat.cat]||[]).forEach(name=>{
      const k=cat.cat+'|'+name;
      if(starSet.has(k)||mealStars.has('meal|'+name)){
        const mCat=catToCode(cat.cat);
        if(!catCode||mCat===catCode)favs.push({t:name,c:mCat});
      }
    });
  }
  return favs;
}

function catToCode(catName){
  const map={'Verduras':'verd','Huevos':'hue','Legumbres':'leg','Cereales':'cer','Pescado blanco':'psb','Pescado azul':'psa','Carne blanca':'cab','Carne roja':'car','Fruta':'fru'};
  return map[catName]||'verd';
}

function pickFrom(arr,used){
  // prefer not recently used
  const fresh=arr.filter(it=>!used.has(it.t));
  const pool=fresh.length?fresh:arr;
  return pool[Math.floor(Math.random()*pool.length)];
}

function generateMenu(){
  const dias=semanas[wk].dias;

  // Category groups by slot role
  const SLOT0_CATS=['verd','leg','cer'];         // 1er plato: vegetal, legumbre o cereal
  const SLOT1_CATS=['cab','car','psb','psa','hue']; // 2º plato: siempre proteína
  const SLOT2_CATS=['fru','lac'];                 // Postre: fruta o lácteo

  function poolFor(cats){
    const favs=allFavs.filter(it=>cats.includes(it.c));
    if(favs.length)return favs;
    // fallback by category
    const fb=[];
    cats.forEach(cat=>{
      const f=fallbacks[cat]||[];f.forEach(it=>fb.push(it));
    });
    return fb.length?fb:[{t:'Fruta',c:'fru'}];
  }

  const allFavs=getFavorites(null);
  const fallbacks={
    fru:[{t:'Fruta',c:'fru'},{t:'Sandía',c:'fru'},{t:'Melón',c:'fru'}],
    verd:[{t:'Crema de verduras',c:'verd'},{t:'Ensalada',c:'verd'},{t:'Menestra',c:'verd'},{t:'Gazpacho',c:'verd'}],
    leg:[{t:'Lentejas',c:'leg'},{t:'Garbanzos',c:'leg'},{t:'Alubias',c:'leg'}],
    cer:[{t:'Arroz',c:'cer'},{t:'Pasta',c:'cer'},{t:'Puré de patata',c:'cer'},{t:'Sopa',c:'cer'}],
    hue:[{t:'Tortilla francesa',c:'hue'},{t:'Revuelto de verduras',c:'hue'},{t:'Huevo duro',c:'hue'}],
    lac:[{t:'Yogur',c:'lac'}],
    psb:[{t:'Merluza',c:'psb'},{t:'Gallo',c:'psb'}],
    psa:[{t:'Salmón',c:'psa'}],
    cab:[{t:'Pollo plancha',c:'cab'},{t:'Pavo',c:'cab'},{t:'Pollo al curry',c:'cab'}],
    car:[{t:'Filete ternera',c:'car'},{t:'Burguer',c:'car'},{t:'Albóndigas',c:'car'}],
  };

  const used=new Set(); // track recently used names to avoid repetition

  function pick(cats, excludeNames=[]){
    const pool=poolFor(cats).filter(it=>!excludeNames.includes(it.t));
    const fresh=pool.filter(it=>!used.has(it.t));
    const src=fresh.length?fresh:pool.length?pool:poolFor(cats);
    const item=src[Math.floor(Math.random()*src.length)];
    used.add(item.t);
    return{...item};
  }

  // Count what's already needed per category from cole
  const counts={};Object.keys(TARGETS).forEach(k=>counts[k]=0);
  dias.forEach(dia=>{
    if(dia.familia)return;
    ((dia.ninos||{}).comida||[]).forEach(it=>{if(counts[it.c]!==undefined)counts[it.c]++;});
  });

  // prioritize most-needed protein category for slot1
  function bestProteinCat(){
    const prots=['cab','car','psb','psa','hue'];
    return prots.sort((a,b)=>
      (TARGETS[b]-(counts[b]||0))-(TARGETS[a]-(counts[a]||0))
    );
  }
  function bestFirstCat(){
    const firsts=['verd','leg','cer'];
    return firsts.sort((a,b)=>
      (TARGETS[b]-(counts[b]||0))-(TARGETS[a]-(counts[a]||0))
    );
  }

  dias.forEach((dia)=>{
    const isWeekend=!!dia.familia;
    const isSchoolDay=!isWeekend;

    // get what niños already had at cole today (avoid repeat same protein)
    const coleProteins=isSchoolDay?
      ((dia.ninos||{}).comida||[]).filter(it=>SLOT1_CATS.includes(it.c)).map(it=>it.t):[];
    const coleFirsts=isSchoolDay?
      ((dia.ninos||{}).comida||[]).filter(it=>SLOT0_CATS.includes(it.c)).map(it=>it.t):[];

    function buildMeal(excludeFirst=[], excludeSecond=[]){
      const p0=bestFirstCat();
      const s0=pick(p0, excludeFirst);
      counts[s0.c]=(counts[s0.c]||0)+1;

      const p1=bestProteinCat();
      // avoid picking same category as slot0, and avoid repeating cole proteins
      const s1=pick(p1, excludeSecond);
      counts[s1.c]=(counts[s1.c]||0)+1;

      const s2=pick(['fru','lac']);
      counts[s2.c]=(counts[s2.c]||0)+1;

      return[s0,s1,s2];
    }

    if(isSchoolDay){
      const cena=buildMeal(coleFirsts, coleProteins);
      dia.ninos.cena=cena;
      if(!dia.adultos)dia.adultos={comida:[],cena:[]};
      dia.adultos.cena=[{...cena[0]},{...cena[1]},{t:'',c:'empty'}];
    }

    if(isWeekend){
      const comida=buildMeal([],[]);
      dia.familia.comida=comida;
      dia.familia.merienda=[{t:'Fruta',c:'fru'}];
      const cena=buildMeal(
        [comida[0].t], // avoid same first as lunch
        [comida[1].t]  // avoid same protein as lunch
      );
      dia.familia.cena=cena;
    }
  });

  save();render();
}

  who=b.dataset.who;document.querySelectorAll('#ctrl [data-who]').forEach(t=>t.classList.remove('on'));b.classList.add('on');render();
});
document.getElementById('btn-gen').addEventListener('click',generateMenu);
document.getElementById('balance-toggle').addEventListener('click',e=>{
  const grid=document.getElementById('balance-grid');
  const tog=document.getElementById('balance-toggle');
  const hidden=grid.style.display==='none';
  grid.style.display=hidden?'grid':'none';
  tog.textContent=hidden?'Ocultar':'Mostrar';

document.getElementById('save-gh-btn').addEventListener('click',saveToGitHub);
document.getElementById('wk-prev').addEventListener('click',()=>{wk=Math.max(0,wk-1);mSlide=0;render();});
document.getElementById('wk-next').addEventListener('click',()=>{wk=Math.min(semanas.length-1,wk+1);mSlide=0;render();});

// Load from GitHub on startup, fall back to localStorage
setStatus('Cargando...');
loadFromGitHub().then(ok=>{
  if(ok){render();}
  else{setStatus('');render();}
});

document.getElementById('main').addEventListener('click',e=>{
  const block=e.target.closest('[data-di][data-who][data-sec][data-idx]');
  if(block){
    // if click was on meal-star button, handle star toggle not edit
    const mealStarBtn=e.target.closest('[data-meal-star]');
    if(mealStarBtn){
      e.stopPropagation();
      toggleMealStar(mealStarBtn.dataset.mealStar,mealStarBtn.dataset.mealName,mealStarBtn.dataset.mealCat,mealStarBtn);
      return;
    }
    openEdit(+block.dataset.di,block.dataset.who,block.dataset.sec,+block.dataset.idx);return;
  }
  if(e.target.id==='edit-save'){saveEdit();return;}
  if(e.target.id==='edit-cancel'){closeOv();return;}
  if(e.target.id==='edit-clear'){clearEdit();return;}
  if(e.target.classList.contains('ov')){closeOv();return;}
  const star=e.target.closest('[data-star]');
  if(star){const k=star.dataset.star;starSet.has(k)?starSet.delete(k):starSet.add(k);star.classList.toggle('on',starSet.has(k));save();if(starsOnly&&!starSet.has(k))render();return;}
  const shopEdit=e.target.closest('[data-edit-ci]');
  if(shopEdit){openShopItemEdit(+shopEdit.dataset.editCi,+shopEdit.dataset.editIi);return;}
  // pick store from edit sheet
  const pickEdit=e.target.closest('[data-pick-store-edit]');
  if(pickEdit){
    const[ci,ii,s]=pickEdit.dataset.pickStoreEdit.split('_');
    shopItems[+ci].items[+ii].store=s==='Sin tienda'?'':s;
    save();closeSheet();render();return;
  }
  // save shop item name
  if(e.target.id==='shop-item-save'){
    const ci=+e.target.dataset.saveCi,ii=+e.target.dataset.saveIi;
    const v=document.getElementById('shop-edit-in').value.trim();
    if(v)shopItems[ci].items[ii].n=v;
    save();closeSheet();render();return;
  }
  // delete shop item
  if(e.target.id==='shop-item-del'){
    const ci=+e.target.dataset.delCi,ii=+e.target.dataset.delIi;
    shopItems[ci].items.splice(ii,1);
    save();closeSheet();render();return;
  }
  const badge=e.target.closest('[data-store-ci]');if(badge){openStorePicker(+badge.dataset.storeCi,+badge.dataset.storeIi);return;}
  const pick=e.target.closest('[data-pick-store]');if(pick){assignStore(pick.dataset.pickStore);return;}
  if(e.target.closest('[data-close-sheet]')||e.target.classList.contains('sheet-ov')){closeSheet();return;}
  if(e.target.id==='ns-btn'){addNewStore();return;}
  if(e.target.id==='dupe-ok'||e.target.classList.contains('dupe-ov')){closeSheet();return;}
  if(e.target.id==='shop-add-btn'){addShop();return;}
  if(e.target.id==='idea-add-btn'){addIdea();return;}
  const sfc=e.target.closest('[data-sfc]');if(sfc){activeStore=sfc.dataset.sfc;render();return;}
  if(e.target.id==='star-filt'){starsOnly=!starsOnly;e.target.classList.toggle('on',starsOnly);render();return;}
  const cb=e.target.closest('[data-cb]');if(cb&&e.target.type==='checkbox'){const[ci,ii]=cb.dataset.cb.split('_').map(Number);shopItems[ci].items[ii].checked=e.target.checked;cb.classList.toggle('done',e.target.checked);save();}
});
document.getElementById('main').addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(e.target.id==='edit-in')saveEdit();if(e.target.id==='shop-in')addShop();if(e.target.id==='shop-edit-in'){const btn=document.getElementById('shop-item-save');if(btn)btn.click();}if(e.target.id==='idea-in')addIdea();if(e.target.id==='ns-in')addNewStore();}
  if(e.key==='Escape'){closeOv();closeSheet();}
});
// ── DRAG & DROP (mouse + touch) ───────────────────────────────────────────
let dragSrc=null;
let touchClone=null;

function getBlockFromPoint(x,y){
  // temporarily hide clone so it doesn't block elementFromPoint
  if(touchClone)touchClone.style.display='none';
  const el=document.elementFromPoint(x,y);
  if(touchClone)touchClone.style.display='';
  return el?el.closest('[data-di][data-who][data-sec][data-idx]'):null;
}

function doSwap(dst){
  if(!dragSrc||!dst)return;
  if(dst.di===dragSrc.di&&dst.whoKey===dragSrc.whoKey&&dst.sec===dragSrc.sec&&dst.idx===dragSrc.idx)return;
  const srcDia=semanas[wk].dias[dragSrc.di];
  const dstDia=semanas[wk].dias[dst.di];
  const srcItems=getItems(srcDia,dragSrc.whoKey,dragSrc.sec);
  const dstItems=getItems(dstDia,dst.whoKey,dst.sec);
  while(srcItems.length<=dragSrc.idx)srcItems.push({t:'',c:'empty'});
  while(dstItems.length<=dst.idx)dstItems.push({t:'',c:'empty'});
  const sameGroup=dragSrc.whoKey===dst.whoKey;
  if(sameGroup){
    const tmp={...srcItems[dragSrc.idx]};
    srcItems[dragSrc.idx]={...dstItems[dst.idx]};
    dstItems[dst.idx]=tmp;
  } else {
    dstItems[dst.idx]={...srcItems[dragSrc.idx]};
  }
  setItems(srcDia,dragSrc.whoKey,dragSrc.sec,srcItems);
  setItems(dstDia,dst.whoKey,dst.sec,dstItems);
  save();render();
}

// ── MOUSE DRAG ──
document.getElementById('main').addEventListener('dragstart',e=>{
  const el=e.target.closest('[draggable=true][data-di]');
  if(!el)return;
  dragSrc={di:+el.dataset.di,whoKey:el.dataset.who,sec:el.dataset.sec,idx:+el.dataset.idx};
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
});
document.getElementById('main').addEventListener('dragend',e=>{
  document.querySelectorAll('.dragging,.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));
  dragSrc=null;
});
document.getElementById('main').addEventListener('dragover',e=>{
  const el=e.target.closest('[data-di][data-who][data-sec][data-idx]');
  if(!el||!dragSrc)return;
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  el.classList.add('drag-over');
});
document.getElementById('main').addEventListener('dragleave',e=>{
  const el=e.target.closest('[data-di][data-who][data-sec][data-idx]');
  if(el)el.classList.remove('drag-over');
});
document.getElementById('main').addEventListener('drop',e=>{
  e.preventDefault();
  const el=e.target.closest('[data-di][data-who][data-sec][data-idx]');
  if(!el||!dragSrc)return;
  el.classList.remove('drag-over');
  doSwap({di:+el.dataset.di,whoKey:el.dataset.who,sec:el.dataset.sec,idx:+el.dataset.idx});
  dragSrc=null;
});

// ── TOUCH DRAG ──
let touchStartTime=0;
let touchStartEl=null;
let touchMoved=false;

document.getElementById('main').addEventListener('touchstart',e=>{
  const el=e.target.closest('[draggable=true][data-di]');
  if(!el)return;
  if(e.target.closest('[data-meal-star]'))return;
  touchStartEl=el;
  touchStartTime=Date.now();
  touchMoved=false;
  // start drag after 300ms hold
  setTimeout(()=>{
    if(!touchMoved&&touchStartEl===el){
      dragSrc={di:+el.dataset.di,whoKey:el.dataset.who,sec:el.dataset.sec,idx:+el.dataset.idx};
      const rect=el.getBoundingClientRect();
      touchClone=el.cloneNode(true);
      touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.75;pointer-events:none;z-index:999;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);`;
      document.body.appendChild(touchClone);
      el.classList.add('dragging');
      // small vibration feedback if available
      if(navigator.vibrate)navigator.vibrate(30);
    }
  },300);
},{passive:true});

document.getElementById('main').addEventListener('touchmove',e=>{
  touchMoved=true;
  if(!dragSrc||!touchClone)return;
  e.preventDefault();
  const touch=e.touches[0];
  touchClone.style.left=(touch.clientX-60)+'px';
  touchClone.style.top=(touch.clientY-20)+'px';
  const over=getBlockFromPoint(touch.clientX,touch.clientY);
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  if(over)over.classList.add('drag-over');
},{passive:false});

document.getElementById('main').addEventListener('touchend',e=>{
  touchStartEl=null;
  if(!dragSrc){return;} // was a tap, let click handler deal with it
  const touch=e.changedTouches[0];
  const over=getBlockFromPoint(touch.clientX,touch.clientY);
  document.querySelectorAll('.dragging,.drag-over').forEach(el=>el.classList.remove('dragging','drag-over'));
  if(touchClone){touchClone.remove();touchClone=null;}
  if(over){
    doSwap({di:+over.dataset.di,whoKey:over.dataset.who,sec:over.dataset.sec,idx:+over.dataset.idx});
  }
  dragSrc=null;
},{passive:true});

render();
</script>
